<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crosshair Hub</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
background:#0D0D0D;
color:white;
font-family:Orbitron,sans-serif;
}

.container{

width:90%;
max-width:1200px;

margin:auto;

padding:40px 20px;

}

.title{

text-align:center;

font-size:55px;

color:#FF4655;

text-shadow:0 0 25px #FF4655;

margin-bottom:15px;

}

.subtitle{

text-align:center;

color:#aaa;

margin-bottom:50px;

font-size:18px;

}

.publish-box{

background:#151515;

border:1px solid #FF4655;

padding:30px;

border-radius:12px;

display:flex;

flex-direction:column;

align-items:center;

gap:20px;

box-shadow:0 0 20px rgba(255,70,85,.3);

}

.publish-box input{

width:80%;

padding:15px;

background:#111;

border:1px solid #FF4655;

color:white;

font-size:16px;

}

.publish-btn{

background:#FF4655;

border:none;

padding:15px 40px;

color:white;

font-size:18px;

cursor:pointer;

border-radius:8px;

box-shadow:0 0 20px #FF4655;

transition:.3s;

}

.publish-btn:hover{

transform:scale(1.05);

}

.community-title{

text-align:center;

margin-top:60px;

font-size:35px;

color:#FF4655;

}

.crosshair-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;

margin-top:35px;

}

.card{

background:#151515;

border:1px solid #FF4655;

padding:25px;

border-radius:10px;

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 0 20px #FF4655;

}

.crosshair-preview{

height:150px;

background:#111;

border:1px solid #333;

display:flex;

justify-content:center;

align-items:center;

margin-bottom:15px;

position:relative;

}

.preview-cross{

position:relative;

width:40px;
height:40px;

}

.preview-cross::before{

content:"";

position:absolute;

left:50%;
top:0;

width:3px;
height:40px;

background:#00ff00;

transform:translateX(-50%);

}

.preview-cross::after{

content:"";

position:absolute;

top:50%;
left:0;

height:3px;
width:40px;

background:#00ff00;

transform:translateY(-50%);

}

.rating{

color:gold;

margin-top:10px;

font-size:18px;

}

.card h3{

color:#FF4655;

margin-bottom:15px;

}

.code{

background:#111;

padding:12px;

border-radius:6px;

word-break:break-all;

margin-bottom:15px;

}

.card-buttons{

display:flex;

gap:10px;

}

.small-btn{

flex:1;

padding:10px;

border:none;

cursor:pointer;

background:#FF4655;

color:white;

border-radius:6px;

}

.likes{

margin-top:15px;

color:#aaa;

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
RadiantForge
</div>

<ul class="nav-links">

<li>
<a href="../index.html">Home</a>
</li>

</ul>

</nav>

<div class="container">

<h1 class="title">
Crosshair Hub
</h1>

<p class="subtitle">
Share your Valorant crosshair with the community.
</p>

<div class="publish-box">

<input
id="crosshairCode"
type="text"
placeholder="Paste Valorant Crosshair Code">

<button
class="publish-btn"
id="publishBtn">

🚀 Publish Crosshair

</button>

</div>

<h2 class="community-title">

🔥 Community Crosshairs

</h2>

<div
class="crosshair-grid"
id="crosshairGrid">

</div>

</div>

<script>

const grid =
document.getElementById(
"crosshairGrid"
);

const saved =
JSON.parse(
localStorage.getItem(
"communityCrosshairs"
) || "[]"
);

function render(){

grid.innerHTML="";

saved.forEach((item,index)=>{

const card =
document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="crosshair-preview">

<div class="preview-cross"></div>

</div>

<h3>
${item.name}
</h3>



<div class="rating">

⭐⭐⭐⭐⭐

</div>

<div class="card-buttons">

<button
class="small-btn"
onclick="copyCode('${item.code}')">
Copy
</button>

<button
class="small-btn"
onclick="likeCrosshair(${index})">
👍 Like
</button>

<button
class="small-btn"
onclick="removeCrosshair(${index})">
🗑 Remove
</button>

</div>
<div class="likes">

Likes: ${item.likes}

</div>
   
`;`;

<h3>
${item.name}
</h3>

<div class="code">
${item.code}
</div>

<div class="card-buttons">

<button
class="small-btn"
onclick="copyCode('${item.code}')">

Copy

</button>

<button
class="small-btn"
onclick="likeCrosshair(${index})">

👍 Like

</button>

</div>

<div class="likes">

Likes: ${item.likes}

</div>

`;

grid.appendChild(card);

});

}

function copyCode(code){

navigator.clipboard.writeText(code);

alert("Code Copied!");

}

function likeCrosshair(index){

saved[index].likes++;

localStorage.setItem(
"communityCrosshairs",
JSON.stringify(saved)
);

render();

}

function removeCrosshair(index){

saved.splice(index,1);

localStorage.setItem(
"communityCrosshairs",
JSON.stringify(saved)
);

render();

}

render();


document
.getElementById("publishBtn")
.addEventListener("click",()=>{

const code =
document.getElementById(
"crosshairCode"
).value;

if(code==="")
{
alert("Paste a Crosshair Code");
return;
}

saved.push({

name:"Community Crosshair",

code:code,

likes:0

});

localStorage.setItem(
"communityCrosshairs",
JSON.stringify(saved)
);

document.getElementById(
"crosshairCode"
).value="";

render();

});

render();

</script>

</body>
</html>
